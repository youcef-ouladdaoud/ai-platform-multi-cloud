apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: open-webui-secrets
  namespace: ai-platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: open-webui-secrets
    creationPolicy: Owner
  data:
    - secretKey: secret-key
      remoteRef:
        key: ai-platform-dev/open-webui  # Will be templated
        property: secret-key
    - secretKey: ollama-api-key
      remoteRef:
        key: ai-platform-dev/open-webui
        property: ollama-api-key
    - secretKey: openai-api-key
      remoteRef:
        key: ai-platform-dev/open-webui
        property: openai-api-key
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: ai-platform
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
