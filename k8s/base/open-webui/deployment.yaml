apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: ai-platform
  labels:
    app: open-webui
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
        app.kubernetes.io/name: open-webui
        app.kubernetes.io/component: web-ui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Ollama Cloud API Configuration
            - name: OLLAMA_BASE_URL
              value: "https://api.ollama.ai"
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: ollama-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: openai-api-key
                  optional: true
            # WebUI Configuration
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: secret-key
            - name: WEBUI_AUTH
              value: "true"
            - name: ENABLE_SIGNUP
              value: "true"
            - name: DEFAULT_MODELS
              value: "llama2,mistral,codellama"
            # Privacy Settings
            - name: SCARF_NO_ANALYTICS
              value: "true"
            - name: DO_NOT_TRACK
              value: "true"
            - name: ANONYMIZED_TELEMETRY
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: webui-data
              mountPath: /app/backend/data
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: webui-data
          persistentVolumeClaim:
            claimName: open-webui-data
