apiVersion: v1
kind: Secret
metadata:
  name: open-webui-secrets
  namespace: ai-platform
  labels:
    app: open-webui
    app.kubernetes.io/name: open-webui
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  secret-key: "change-this-in-production-to-a-secure-key"
  # Get your Ollama API key from: https://ollama.com/settings/api
  ollama-api-key: "your-ollama-cloud-api-key-here"
  # Optional: OpenAI API key for additional models
  openai-api-key: ""
