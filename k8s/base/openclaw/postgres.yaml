apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openclaw-postgres
  namespace: ai-platform
  labels:
    app: openclaw-postgres
    app.kubernetes.io/name: openclaw-postgres
    app.kubernetes.io/component: database
spec:
  serviceName: openclaw-postgres
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-postgres
  template:
    metadata:
      labels:
        app: openclaw-postgres
        app.kubernetes.io/name: openclaw-postgres
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: openclaw-postgres-secrets
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-postgres-secrets
                  key: password
            - name: POSTGRES_DB
              value: openclaw
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: openclaw-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-postgres
  namespace: ai-platform
  labels:
    app: openclaw-postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
  selector:
    app: openclaw-postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-postgres-data
  namespace: ai-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-postgres-secrets
  namespace: ai-platform
  labels:
    app: openclaw-postgres
type: Opaque
stringData:
  username: "openclaw"
  password: "change-this-secure-password"
