apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  namespace: ai-platform
  labels:
    app: openclaw
    app.kubernetes.io/name: openclaw
type: Opaque
stringData:
  # Get your OpenClaw API key from: https://openclaw.ai/settings
  api-key: "your-openclaw-api-key-here"
  # Optional: OpenAI API key for enhanced analysis
  openai-api-key: ""
  # Database connection string (PostgreSQL recommended)
  database-url: "postgresql://user:password@openclaw-postgres:5432/openclaw"
